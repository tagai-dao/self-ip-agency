# Self-IP Agency — Main Configuration
# Edit this file to tune TAS weights, mode thresholds, and platform settings.

agency:
  name: "self-ip-agency"
  version: "1.0.0"

# TAS composite score weights
tas:
  social_weight: 0.7    # 70% contribution from TAS_social
  trade_weight: 0.3     # 30% contribution from TAS_trade
  # TAS = (TAS_social × social_weight) + (TAS_trade × trade_weight)

# Operation mode thresholds
modes:
  idle:
    description: "Minimal activity — conserve VP, no trades"
    max_op: 799
    max_vp: 99
  active:
    description: "Normal cadence — standard curation and trading"
    min_op: 800
    min_vp: 100
  super:
    description: "Aggressive — maximum curation and priority trades"
    min_op: 1200
    min_vp: 150

# Curation / VP settings
social:
  vp_budget_daily: 1000          # VP allocated per day
  vp_reserve_floor: 50           # Never go below this
  curation_vp_pct: 0.60          # 60% of VP budget for curation
  posting_vp_pct: 0.25           # 25% for creating content
  reserve_vp_pct: 0.15           # 15% held in reserve
  cycle_interval_minutes: 30     # Bookmarker cycle frequency
  super_cycle_interval_minutes: 15  # Cycle frequency in super mode

# Trading settings
trading:
  max_per_trade_pct: 0.05        # 5% of wallet per trade
  daily_loss_limit_pct: 0.10     # 10% daily loss stops trading
  min_signal_confidence: 0.7     # Minimum signal confidence to trade
  cycle_interval_minutes: 60     # Trader cycle frequency
  volatility_halt_pct: 0.20      # Halt if 1h price move > 20%

# Platform API endpoints
platform:
  tagclaw:
    base_url: "https://bsc-api.tagai.fun/tagclaw"
    endpoints:
      feed: "/feed"
      post: "/post"
      reply: "/reply"
      like: "/like"
      curate: "/curate"
      me: "/me"
      balance: "/wallet/balance"
      trending: "/trending"

# Runtime paths (relative to workspace)
runtime:
  main_dir: "runtime/main"
  bookmarker_dir: "runtime/bookmarker"
  trader_dir: "runtime/trader"
  shared_dir: "runtime/shared"

# Enable the trader social-brief pipeline by default so installs materialize
# the full X -> brief -> TagAI import lane without extra operator toggles.
social_brief_enabled: true

# Dashboard settings
dashboard:
  enabled: true
  port: 7890
  host: "0.0.0.0"
  auto_refresh_seconds: 30
  # Public exposure is operator-controlled and runs via
  # `scripts/dashboard-service.sh start-public` (Cloudflare Quick Tunnel, MVP).
  # The installer does TWO separate things:
  #   - suggest_in_install: emit guidance + a next-step in install outputs when
  #     the local dashboard is healthy and the public tunnel is not running yet.
  #     Default ON so new operators get a clear path to a public URL.
  #   - auto_start: actually launch the tunnel during install. Default OFF so
  #     the installer never exposes a dashboard publicly without an explicit
  #     operator action. Operators run `dashboard-service.sh start-public`
  #     themselves after install.
  # `enabled` is retained as a legacy alias that mirrors `auto_start`.
  public:
    suggest_in_install: true
    auto_start: true
    enabled: true
    provider: "cloudflare"
    mode: "quick"

# Identity self-heal (PR-B)
# Heartbeat-driven self-heal for owner X/Twitter binding. When TagClaw status
# is "active" but agency-identity.json:owner.verified is not yet true, each
# main-heartbeat.sh run calls refresh-agency-identity.sh --verify-api to
# probe TagClaw /me and backfill ownerTwitterHandle/Id. See
# docs/design/x-sync-twitter-binding-fix.md §4.4 and
# docs/ops/owner-binding-hooks.md.
#
# Ops can also disable at runtime by writing {"disabled":true} to
# <workspace>/runtime/shared/identity-sync.json.
identity:
  self_heal:
    enabled: true     # master toggle; flip to false to halt heartbeat /me probing

# Announce settings (OPTIONAL — not required for local deployments)
# Uncomment and configure only if you want cycle results announced to a channel.
# Without this, all cycle scripts run locally and write to runtime/*/ only.
# announce:
#   enabled: false
#   channel: ""          # e.g. "discord://webhook-url" or "slack://channel-id"
#   on_heartbeat: false  # announce main heartbeat results
#   on_bookmarker: false # announce bookmarker cycle results
#   on_trader: false     # announce trader cycle results
