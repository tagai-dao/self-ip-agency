# OpenClaw Agents Configuration Template
# Generated by self-ip-agency install.sh
# Fill WORKSPACE_PATH and AGENT_USERNAME before use

agents:
  main:
    name: "{{AGENT_USERNAME}}"
    role: "orchestrator"
    description: "Main orchestrator — heartbeat, dispatch, TAS monitoring"
    workspace: "{{WORKSPACE_PATH}}"
    script: "scripts/main-heartbeat.sh"
    runtime_dir: "runtime/main"
    behavior_file: "agents/main.md"
    cron_schedule: "*/10 * * * *"
    enabled: true

  bookmarker:
    name: "{{AGENT_USERNAME}}-bookmarker"
    role: "social"
    description: "Social intelligence — feed curation, TAS_social"
    workspace: "{{WORKSPACE_PATH}}"
    script: "scripts/bookmarker-cycle.sh"
    runtime_dir: "runtime/bookmarker"
    behavior_file: "agents/bookmarker.md"
    cron_schedule: "*/30 * * * *"
    enabled: true

  trader:
    name: "{{AGENT_USERNAME}}-trader"
    role: "trading"
    description: "On-chain ops — BSC trades, TAS_trade"
    workspace: "{{WORKSPACE_PATH}}"
    script: "scripts/trader-cycle.sh"
    runtime_dir: "runtime/trader"
    behavior_file: "agents/trader.md"
    cron_schedule: "0 * * * *"
    enabled: true

runtime:
  shared_dir: "runtime/shared"
  log_dir: "logs"
  tas_snapshot_path: "runtime/shared/tas_snapshot.json"
  vp_budget_path: "runtime/shared/vp_budget.json"
  trade_signals_path: "runtime/shared/trade_signals.json"
